<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Cart - ShopEasy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght..144,500;9..144,600;9..144,700&family=Inter:wght;500;600;700&family=IBM+Plex+Mono:wght;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<div class="container">
  <h1 class="section-title">Your Cart</h1>
  <div id="cart-container"><p>Loading...</p></div>
</div>

<script src="js/api.js"></script>
<script>
async function loadCart() {
  const container = document.getElementById('cart-container');
  const user = getUser();
  if (!user) {
    container.innerHTML = `<p class="empty-state">Please <a href="login.html" style="color:#2563eb;">log in</a> to view your cart.</p>`;
    return;
  }

  try {
    const cart = await apiFetch('/cart');
    if (cart.items.length === 0) {
      container.innerHTML = `<p class="empty-state">Your cart is empty. <a href="index.html" style="color:#2563eb;">Browse products</a></p>`;
      return;
    }

    container.innerHTML =
      cart.items
        .map(
          (item) => `
      <div class="cart-item">
        <img src="${item.image}" onerror="this.src='https://via.placeholder.com/70'"/>
        <div class="info">
          <h3>${item.name}</h3>
          <div class="price">$${item.price.toFixed(2)} x ${item.quantity}</div>
        </div>
        <div class="qty-selector">
          <button onclick="changeQty(${item.cart_item_id}, ${item.quantity - 1})">-</button>
          <span>${item.quantity}</span>
          <button onclick="changeQty(${item.cart_item_id}, ${item.quantity + 1})">+</button>
        </div>
        <button class="btn btn-danger" onclick="removeItem(${item.cart_item_id})">Remove</button>
      </div>`
        )
        .join('') +
      `<div class="cart-total"><span>Total</span><span>$${cart.total.toFixed(2)}</span></div>
      <button class="btn" style="margin-top:1rem;width:100%;" id="checkout-btn">Checkout</button>
      <p class="error-msg" id="checkout-msg"></p>`;

    document.getElementById('checkout-btn').addEventListener('click', checkout);
  } catch (err) {
    container.innerHTML = `<p class="error-msg">${err.message}</p>`;
  }
}

async function changeQty(cartItemId, newQty) {
  if (newQty < 1) return removeItem(cartItemId);
  try {
    await apiFetch(`/cart/${cartItemId}`, {
      method: 'PUT',
      body: JSON.stringify({ quantity: newQty }),
    });
    loadCart();
    updateCartBadge();
  } catch (err) {
    alert(err.message);
  }
}

async function removeItem(cartItemId) {
  try {
    await apiFetch(`/cart/${cartItemId}`, { method: 'DELETE' });
    loadCart();
    updateCartBadge();
  } catch (err) {
    alert(err.message);
  }
}

async function checkout() {
  const msg = document.getElementById('checkout-msg');
  try {
    const result = await apiFetch('/orders', { method: 'POST' });
    window.location.href = `orders.html?placed=${result.orderId}`;
  } catch (err) {
    msg.textContent = err.message;
  }
}

loadCart();
</script>
</body>
</html>
