<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register - ShopEasy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght..144,500;9..144,600;9..144,700&family=Inter:wght;500;600;700&family=IBM+Plex+Mono:wght;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<div class="form-card">
  <h2>Create Account</h2>
  <form id="register-form">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="name" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required />
    </div>
    <div class="form-group">
      <label>Password (min 6 characters)</label>
      <input type="password" id="password" required minlength="6" />
    </div>
    <button type="submit" class="btn" style="width:100%;">Register</button>
    <p class="error-msg" id="error"></p>
  </form>
  <div class="form-footer">Already have an account? <a href="login.html" style="color:#2563eb;">Login</a></div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');

  try {
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ name, email, password }),
    });
    setUser(data.user);
    window.location.href = 'index.html';
  } catch (err) {
    errorEl.textContent = err.message;
  }
});
</script>
</body>
</html>
